<!DOCTYPE html>

<html>

<head>
    <title>Register</title>
    <link rel="stylesheet"
href="{{ url_for('static',
filename='style.css') }}">

</head>

<body>

<h2>Register</h2>

<form method="POST">

<label>Name</label>
<input type="text" name="name" required>

<br><br>

<label>Email</label>
<input type="email" name="email" required>

<br><br>

<label>Password</label>
<input type="password" name="password" required>

<br><br>

<label>Branch</label>
<input type="text" name="branch" required>

<br><br>

<label>CGPA</label>
<input type="number" step="0.1" name="cgpa" required>

<br><br>

<button type="submit">

Register

</button>

</form>


<footer>

<p>
Student Placement Tracker © 2026
</p>

</footer>
</body>

</html>
