<!DOCTYPE html>
<html>
<head>
    <title>Eligible Companies</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h2>Eligible Companies</h2>
    <input type="text" id="search" placeholder="Search Eligible Company">
    <br><br>

    <table border="1">
        <tr>
            <th>Company</th>
            <th>Package</th>
            <th>Minimum CGPA</th>
            <th>Apply</th>
            <th>Details</th>
        </tr>

        {% for company in companies %}
        <tr>
            <td>{{company[1]}}</td>
            <td>{{company[2]}}</td>
            <td>{{company[3]}}</td>
            
            <!-- 1. Match the 'Apply' Header -->
            <td>
                <a href="/apply/{{company[0]}}">
                    <button>Apply</button>
                </a>
            </td>

            <!-- 2. Match the 'Details' Header -->
            <td>
                <a href="/company/{{company[0]}}">
                    <button>View Details</button>
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <script>
        document.getElementById("search").addEventListener("keyup", function(){
            let filter = this.value.toUpperCase();
            let rows = document.querySelectorAll("table tr");
            rows.forEach((row, index)=>{
                if(index===0) return;
                let text = row.innerText.toUpperCase();
                row.style.display = text.includes(filter) ? "" : "none";
            });
        });
    </script>
<footer>

<p>
Student Placement Tracker © 2026
</p>

</footer>
</body>
</html>
