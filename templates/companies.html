<!DOCTYPE html>

<html>

<head>

<title>Companies</title>

</head>

<body>

<h2>Available Companies</h2>

<table border="1">

<tr>

<th>Name</th>

<th>Package</th>

<th>Minimum CGPA</th>

<th>Branch</th>

</tr>

<tr>

<td>{{company[1]}}</td>

<td>{{company[2]}}</td>

<td>{{company[3]}}</td>

<td>{{company[4]}}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
